version: '3.8'

x-go-service-defaults: &go-service-defaults
  image: golang:1.21
  restart: unless-stopped

services:
  gateway-service:
    <<: *go-service-defaults
    container_name: gateway_service
    working_dir: /workspace
    command: go run ./cmd/gateway-service
    volumes:
      - ./:/workspace
    env_file:
      - .env
    environment:
      SERVICE_PORT: ${GATEWAY_SERVICE_PORT:-8100}
      JWT_SECRET: ${JWT_SECRET}
      IDENTITY_SERVICE_URL: ${IDENTITY_SERVICE_URL}
      AUDIT_SERVICE_URL: ${AUDIT_SERVICE_URL}
      CONTRACT_SERVICE_URL: ${CONTRACT_SERVICE_URL}
      DOCUMENT_SERVICE_URL: ${DOCUMENT_SERVICE_URL}
      PERFORMANCE_SERVICE_URL: ${PERFORMANCE_SERVICE_URL}
      APPROVAL_WORKFLOW_SERVICE_URL: ${APPROVAL_WORKFLOW_SERVICE_URL}
      RISK_SERVICE_URL: ${RISK_SERVICE_URL}
      AMENDMENT_SERVICE_URL: ${AMENDMENT_SERVICE_URL}
      CLOSURE_SERVICE_URL: ${CLOSURE_SERVICE_URL}
      ARCHIVE_SERVICE_URL: ${ARCHIVE_SERVICE_URL}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
      REPORT_SERVICE_URL: ${REPORT_SERVICE_URL}
      PARTY_SERVICE_URL: ${PARTY_SERVICE_URL}
      SEARCH_AI_SERVICE_URL: ${SEARCH_AI_SERVICE_URL}
    ports:
      - "${GATEWAY_SERVICE_PORT:-8100}:${GATEWAY_SERVICE_PORT:-8100}"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -ec 'exec 3<>/dev/tcp/127.0.0.1/$${SERVICE_PORT};
          printf "GET /health HTTP/1.1\r\nHost: 127.0.0.1\r\nConnection: close\r\n\r\n" >&3;
          grep -q "200" <&3'
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      - identity-service
      - audit-service
      - contract-service
      - document-service
      - performance-service
      - approval-workflow-service
      - risk-service
      - amendment-service
      - closure-service
      - archive-service
      - notification-service
      - report-service
      - party-service
      - search-ai-service

  identity-service:
    <<: *go-service-defaults
    container_name: identity_service
    working_dir: /workspace
    command: go run ./cmd/identity-service
    volumes:
      - ./:/workspace
    env_file:
      - .env
    environment:
      SERVICE_PORT: ${IDENTITY_SERVICE_PORT:-8101}
      JWT_SECRET: ${JWT_SECRET}
      DB_ENABLED: ${DB_ENABLED}
      DB_DRIVER: ${DB_DRIVER}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}

  audit-service:
    <<: *go-service-defaults
    container_name: audit_service
    working_dir: /workspace
